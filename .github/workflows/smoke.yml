name: Smoke tests (Vercel preview)

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  smoke:
    name: Playwright smoke suite
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Wait for Vercel preview deployment
        id: vercel-preview
        uses: zentered/vercel-preview-url@v1.1.5
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        with:
          vercel_team_id: ${{ secrets.VERCEL_TEAM_ID }}
          vercel_project_id: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Run unit tests
        run: npm test

      - name: Run smoke tests against preview URL
        run: npx playwright test tests/smoke.spec.js --reporter=line
        env:
          SMOKE_BASE_URL: ${{ steps.vercel-preview.outputs.preview_url }}
