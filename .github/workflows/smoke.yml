name: Smoke tests (Vercel preview)

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  smoke:
    name: Playwright smoke suite
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Wait for Vercel preview deployment
        id: vercel-preview
        uses: patrickedqvist/wait-for-vercel-preview@v1.3.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max_timeout: 300

      - name: Run unit tests
        run: npm test

      - name: Run smoke tests against preview URL
        run: npx playwright test tests/smoke.spec.js --reporter=line
        env:
          SMOKE_BASE_URL: ${{ steps.vercel-preview.outputs.url }}
