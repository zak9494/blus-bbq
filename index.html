<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blu's BBQ — Operations Dashboard</title>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --surface3: #2e2e2e;
    --border: #333;
    --accent: #e85d04;
    --accent2: #f48c06;
    --text: #f0f0f0;
    --text2: #aaa;
    --text3: #666;
    --green: #2d6a4f;
    --green-light: #52b788;
    --red: #7b2d2d;
    --red-light: #e07070;
    --blue: #1d3557;
    --blue-light: #457b9d;
    --yellow: #5c4a00;
    --yellow-light: #f4c430;
    --radius: 10px;
    --shadow: 0 2px 12px rgba(0,0,0,0.4);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

  /* SIDEBAR */
  #sidebar {
    width: 220px; min-width: 220px; background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; padding: 0; z-index: 10;
  }
  #sidebar .logo {
    padding: 20px 18px 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  #sidebar .logo .flame { font-size: 24px; }
  #sidebar .logo .name { font-size: 15px; font-weight: 700; color: var(--accent); line-height: 1.2; }
  #sidebar .logo .sub { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; }
  #sidebar nav { flex: 1; padding: 12px 8px; }
  #sidebar nav a {
    display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px;
    color: var(--text2); text-decoration: none; font-size: 14px; cursor: pointer;
    transition: all 0.15s; margin-bottom: 2px; border: none; background: none; width: 100%;
  }
  #sidebar nav a:hover { background: var(--surface2); color: var(--text); }
  #sidebar nav a.active { background: var(--accent); color: #fff; font-weight: 600; }
  #sidebar nav a .icon { font-size: 16px; width: 20px; text-align: center; }
  #sidebar .status {
    padding: 14px; border-top: 1px solid var(--border);
    font-size: 11px; color: var(--text3);
  }
  #sidebar .status .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--green-light); margin-right: 5px; }

  /* MAIN CONTENT */
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #topbar {
    height: 58px; background: var(--surface); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 24px; justify-content: space-between; flex-shrink: 0;
  }
  #topbar .page-title { font-size: 18px; font-weight: 700; }
  #topbar .topbar-right { display: flex; align-items: center; gap: 12px; }
  #topbar .badge {
    background: var(--accent); color: #fff; font-size: 11px; font-weight: 700;
    padding: 3px 8px; border-radius: 20px;
  }
  #content { flex: 1; overflow-y: auto; padding: 24px; }

  /* PAGES */
  .page { display: none; }
  .page.active { display: block; }

  /* PIPELINE / KANBAN */
  .kanban-board { display: flex; gap: 16px; overflow-x: auto; padding-bottom: 12px; min-height: calc(100vh - 140px); }
  .kanban-col {
    min-width: 220px; max-width: 220px; background: var(--surface); border-radius: var(--radius);
    border: 1px solid var(--border); display: flex; flex-direction: column;
  }
  .kanban-col-header {
    padding: 12px 14px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .kanban-col-header .col-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
  .kanban-col-header .col-count {
    background: var(--surface3); color: var(--text2); font-size: 11px;
    padding: 2px 7px; border-radius: 10px; font-weight: 600;
  }
  .kanban-cards { flex: 1; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
  .lead-card {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
    padding: 12px; cursor: pointer; transition: all 0.15s;
  }
  .lead-card:hover { border-color: var(--accent); transform: translateY(-1px); box-shadow: var(--shadow); }
  .lead-card .lead-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
  .lead-card .lead-meta { font-size: 11px; color: var(--text2); margin-bottom: 8px; }
  .lead-card .lead-value { font-size: 12px; color: var(--accent2); font-weight: 600; margin-bottom: 8px; }
  .lead-card .lead-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
  .lead-card .tag {
    font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 500;
  }
  .tag-catering { background: #2d3f6e; color: #7eaaff; }
  .tag-corporate { background: #2d5a3f; color: #7ed9a0; }
  .tag-wedding { background: #5a2d5a; color: #d97ed9; }
  .tag-birthday { background: #5a3d2d; color: #d9a07e; }
  .tag-party { background: #3d2d5a; color: #a07ed9; }
  .tag-lunch { background: #2d5a5a; color: #7ed9d9; }
  .lead-card .lead-actions { display: flex; gap: 6px; }
  .btn-xs {
    font-size: 10px; padding: 4px 8px; border-radius: 5px; border: none; cursor: pointer;
    font-weight: 600; transition: all 0.15s;
  }
  .btn-followup { background: var(--surface3); color: var(--text2); }
  .btn-followup:hover { background: var(--accent); color: #fff; }
  .btn-email { background: var(--blue); color: var(--blue-light); }
  .btn-email:hover { background: var(--blue-light); color: #fff; }

  /* STAGE COLORS */
  .col-new .kanban-col-header .col-title { color: var(--text2); }
  .col-contacted .kanban-col-header .col-title { color: var(--blue-light); }
  .col-proposal .kanban-col-header .col-title { color: var(--yellow-light); }
  .col-followup .kanban-col-header .col-title { color: var(--accent); }
  .col-negotiating .kanban-col-header .col-title { color: var(--accent2); }
  .col-won .kanban-col-header .col-title { color: var(--green-light); }
  .col-lost .kanban-col-header .col-title { color: var(--red-light); }

  /* AI CHAT */
  #page-chat { height: calc(100vh - 106px); display: none; flex-direction: column; }
  #page-chat.active { display: flex; }
  .chat-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px; flex-shrink: 0;
  }
  .chat-header h2 { font-size: 16px; font-weight: 700; }
  .chat-close {
    width: 32px; height: 32px; border-radius: 8px; background: var(--surface2);
    border: 1px solid var(--border); color: var(--text2); font-size: 18px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .chat-close:hover { background: var(--red); color: var(--red-light); border-color: var(--red-light); }
  .chat-messages {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px; overflow-y: auto;
